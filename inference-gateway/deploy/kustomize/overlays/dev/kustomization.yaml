apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: inference-gateway-dev

resources:
  - ../../base

# Dev: minimal replicas, smallest model, no GPU required (CPU fallback).
patches:
  - target:
      kind: ConfigMap
      name: vllm-config
    patch: |-
      - op: replace
        path: /data/model_name
        value: "meta-llama/Llama-3-8b-Instruct"
      - op: replace
        path: /data/tensor_parallel_size
        value: "1"
      - op: replace
        path: /data/gpu_memory_utilization
        value: "0.80"
      - op: replace
        path: /data/max_model_len
        value: "4096"

commonLabels:
  environment: dev

configMapGenerator:
  - name: dev-gateway-config
    literals:
      - ENVIRONMENT=dev
      - LOG_LEVEL=debug
      - ENABLE_TRACING=false
